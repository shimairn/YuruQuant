runtime:
  run_id: dual_core_run

broker:
  gm:
    token: ""
    strategy_id: ""
    backtest:
      start: "2025-12-08 09:00:00"
      end: "2026-03-06 15:00:00"
      max_days: 100
      initial_cash: 500000

universe:
  symbols:
    - DCE.P
    - DCE.M
    - DCE.Y
    - DCE.A
    - DCE.C
    - DCE.I
    - DCE.J
    - DCE.JM
    - DCE.L
    - DCE.PP
    - CZCE.MA
    - CZCE.TA
    - CZCE.FG
    - CZCE.SA
    - CZCE.SR
    - CZCE.CF
    - SHFE.RB
    - SHFE.HC
    - SHFE.RU
    - SHFE.BU
  entry_frequency: 300s
  trend_frequency: 3600s

strategy:
  environment:
    mode: ma_macd
    ma_period: 60
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    tsmom_lookbacks: [24, 48, 96]
    tsmom_min_agree: 2
  entry:
    donchian_lookback: 36
    min_channel_width_atr: 0.5
    breakout_atr_buffer: 0.30
    session_end_buffer_bars: 0
    entry_block_major_gap_bars: 0
  exit:
    hard_stop_atr: 2.2
    protected_activate_r: 1.2
    armed_flush_buffer_bars: 0
    armed_flush_min_gap_minutes: 180

portfolio:
  risk_per_trade_ratio: 0.015
  max_total_armed_risk_ratio: 0.0
  max_cluster_armed_risk_ratio: 0.0
  max_same_direction_cluster_positions: 0
  max_daily_loss_ratio: 0.05
  max_drawdown_halt_ratio: 0.15

execution:
  fill_policy: next_bar_open
  backtest_commission_ratio: 0.0010
  backtest_slippage_ratio: 0.0020
