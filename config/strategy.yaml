runtime:
  mode: BACKTEST
  run_id: run_001
  symbols:
    - CZCE.ap
    - CZCE.fg
    - SHFE.ag
    - DCE.p
    - SHFE.rb
    - DCE.m
    - DCE.y
    - CZCE.MA
    - SHFE.cu
    - SHFE.ni
    - SHFE.zn
    - SHFE.au
    - CZCE.sa
    - CZCE.ur
    - CZCE.rm
  freq_5m: 300s
  freq_1h: 3600s
  warmup_5m: 180
  warmup_1h: 120

strategy:
  breakout_lookback_5m: 36
  breakout_min_distance_atr: 0.08
  breakout_width_min_atr: 0.40
  breakout_width_max_atr: 4.00
  volume_ratio_day_min: 1.20
  volume_ratio_night_min: 1.05
  trend_ema_fast_1h: 20
  trend_ema_slow_1h: 60
  trend_strength_min: 0.15
  entry_cooldown_bars: 2
  max_entries_per_day: 12
  target_annual_vol: 0.10
  atr_period: 14

risk:
  risk_per_trade_notional_ratio: 0.020
  fixed_equity_percent: 0.12
  max_pos_size_percent: 0.30
  hard_stop_atr: 2.20
  break_even_activate_r: 1.00
  trail_activate_r: 1.00
  trail_stop_atr: 2.40
  dynamic_stop_enabled: true
  dynamic_stop_atr: 1.40
  dynamic_stop_activate_r: 0.50
  time_stop_bars: 8
  max_stopouts_per_day_per_symbol: 2
  backtest_commission_ratio: 0.0010
  backtest_slippage_ratio: 0.0020

portfolio:
  max_daily_loss_ratio: 0.05
  max_drawdown_halt_ratio: 0.15

gm:
  token: ""
  strategy_id: ""
  serv_addr: ""
  backtest_start: "2025-08-20 00:00:00"
  backtest_end: "2026-02-13 15:00:00"
  backtest_max_days: 180
  backtest_initial_cash: 500000
  backtest_match_mode: 0
  backtest_intraday: false
  subscribe_wait_group: true
  wait_group_timeout: 10

instrument:
  defaults:
    multiplier: 10.0
    min_tick: 1.0
    min_lot: 1
    lot_step: 1
    fixed_equity_percent: 0.12
    max_pos_size_percent: 0.30
    volume_ratio_min:
      day: 1.30
      night: 1.05
    sessions:
      day:
        - ["09:00", "11:30"]
        - ["13:30", "15:00"]
      night:
        - ["21:00", "23:00"]
  symbols: {}

reporting:
  enabled: true
  output_dir: reports
  trade_filename: trade_report.csv
  daily_filename: daily_report.csv
  execution_filename: execution_report.csv

observability:
  level: WARN
  sample_every_n: 50
